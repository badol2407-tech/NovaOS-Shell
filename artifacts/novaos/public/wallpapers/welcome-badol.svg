<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0b1e"/>
      <stop offset="100%" stop-color="#080512"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="48%" r="50%">
      <stop offset="0%" stop-color="#6c47ff" stop-opacity="0.32"/>
      <stop offset="70%" stop-color="#6c47ff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#6c47ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pillGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c5cfc"/>
      <stop offset="100%" stop-color="#5b35e8"/>
    </linearGradient>
    <linearGradient id="headlineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e4daff"/>
      <stop offset="45%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="divider" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6c47ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6c47ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#6c47ff" stop-opacity="0"/>
    </linearGradient>
    <!-- dot grid pattern INSIDE defs -->
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.2" fill="#ffffff" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <!-- 1. Base background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- 2. Violet center glow -->
  <rect width="1920" height="1080" fill="url(#centerGlow)"/>

  <!-- 3. Dot grid -->
  <rect width="1920" height="1080" fill="url(#dots)"/>

  <!-- 4. Corner cross markers -->
  <g stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.5" fill="none">
    <line x1="60" y1="52" x2="60" y2="68"/><line x1="52" y1="60" x2="68" y2="60"/>
    <line x1="1860" y1="52" x2="1860" y2="68"/><line x1="1852" y1="60" x2="1868" y2="60"/>
    <line x1="60" y1="1012" x2="60" y2="1028"/><line x1="52" y1="1020" x2="68" y2="1020"/>
    <line x1="1860" y1="1012" x2="1860" y2="1028"/><line x1="1852" y1="1020" x2="1868" y2="1020"/>
  </g>

  <!-- 5. Thin rule above pill -->
  <rect x="830" y="306" width="260" height="1" fill="#7c5cfc" fill-opacity="0.4"/>

  <!-- 6. WELCOME pill (Clerk primary button) -->
  <rect x="800" y="320" width="320" height="52" rx="26" fill="url(#pillGrad)"/>
  <rect x="801" y="321" width="318" height="26" rx="26" fill="#ffffff" fill-opacity="0.12"/>
  <text x="960" y="356" text-anchor="middle"
    font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
    font-size="17" font-weight="700" letter-spacing="8" fill="#ffffff">WELCOME</text>

  <!-- 7. Main headline -->
  <text x="960" y="560" text-anchor="middle"
    font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
    font-size="148" font-weight="800" letter-spacing="-4"
    fill="url(#headlineGrad)">Ashikur Rahman Badol</text>

  <!-- 8. Violet divider -->
  <rect x="440" y="592" width="1040" height="1.5" fill="url(#divider)"/>

  <!-- 9. Tagline -->
  <text x="960" y="645" text-anchor="middle"
    font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
    font-size="24" font-weight="300" letter-spacing="1"
    fill="#ffffff" fill-opacity="0.4">Your intelligent desktop in the cloud — powered by NovaOS</text>

  <!-- 10. Ghost outline pills (Clerk secondary button style) -->
  <rect x="714" y="714" width="220" height="48" rx="24"
    fill="none" stroke="#7c5cfc" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="824" y="744" text-anchor="middle"
    font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
    font-size="12" font-weight="600" letter-spacing="3"
    fill="#a78bfa" fill-opacity="0.85">NOVAOS</text>

  <rect x="986" y="714" width="220" height="48" rx="24"
    fill="none" stroke="#7c5cfc" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="1096" y="744" text-anchor="middle"
    font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
    font-size="12" font-weight="600" letter-spacing="3"
    fill="#a78bfa" fill-opacity="0.85">AI POWERED</text>
</svg>
