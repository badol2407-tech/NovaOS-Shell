<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0a0714"/>
      <stop offset="100%" stop-color="#05030a"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="48%" r="45%">
      <stop offset="0%" stop-color="#6c47ff" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#6c47ff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#6c47ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="topGlow" cx="50%" cy="0%" r="55%">
      <stop offset="0%" stop-color="#4f35cc" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#4f35cc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="headlineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e2d9ff"/>
      <stop offset="45%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="pillGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c5cfc"/>
      <stop offset="100%" stop-color="#5b35e8"/>
    </linearGradient>
    <linearGradient id="divider" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6c47ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6c47ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6c47ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="subtleGrid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.01"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Ambient violet glow -->
  <rect width="1920" height="1080" fill="url(#centerGlow)"/>
  <rect width="1920" height="1080" fill="url(#topGlow)"/>

  <!-- Dot grid — simple, reliable -->
  <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1.2" fill="#ffffff" fill-opacity="0.055"/>
  </pattern>
  <rect width="1920" height="1080" fill="url(#grid)"/>

  <!-- Decorative corner markers -->
  <g stroke="#ffffff" stroke-opacity="0.1" stroke-width="1.5" fill="none">
    <line x1="60" y1="52" x2="60" y2="68"/><line x1="52" y1="60" x2="68" y2="60"/>
    <line x1="1860" y1="52" x2="1860" y2="68"/><line x1="1852" y1="60" x2="1868" y2="60"/>
    <line x1="60" y1="1012" x2="60" y2="1028"/><line x1="52" y1="1020" x2="68" y2="1020"/>
    <line x1="1860" y1="1012" x2="1860" y2="1028"/><line x1="1852" y1="1020" x2="1868" y2="1020"/>
  </g>

  <!-- Horizontal accent line above pill -->
  <rect x="820" y="302" width="280" height="1" fill="#6c47ff" fill-opacity="0.3"/>

  <!-- WELCOME pill — Clerk primary button style -->
  <rect x="796" y="320" width="328" height="54" rx="27" fill="url(#pillGrad)"/>
  <rect x="797" y="321" width="326" height="27" rx="27" fill="#ffffff" fill-opacity="0.1"/>
  <text
    x="960" y="357"
    text-anchor="middle"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="19"
    font-weight="700"
    letter-spacing="7"
    fill="#ffffff"
  >WELCOME</text>

  <!-- MAIN HEADLINE — full width, bold -->
  <text
    x="960" y="560"
    text-anchor="middle"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="152"
    font-weight="800"
    fill="url(#headlineGrad)"
    letter-spacing="-3"
  >Ashikur Rahman Badol</text>

  <!-- Divider line -->
  <rect x="440" y="594" width="1040" height="1.5" fill="url(#divider)"/>

  <!-- Tagline -->
  <text
    x="960" y="648"
    text-anchor="middle"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="26"
    font-weight="300"
    fill="#ffffff"
    fill-opacity="0.38"
    letter-spacing="1"
  >Your intelligent desktop in the cloud — powered by NovaOS</text>

  <!-- Two ghost pills — Clerk outline button style -->
  <rect x="712" y="718" width="224" height="50" rx="25" fill="none" stroke="#6c47ff" stroke-opacity="0.55" stroke-width="1.5"/>
  <text x="824" y="749"
    text-anchor="middle"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="13" font-weight="600" letter-spacing="3"
    fill="#a78bfa" fill-opacity="0.9">NOVAOS</text>

  <rect x="984" y="718" width="224" height="50" rx="25" fill="none" stroke="#6c47ff" stroke-opacity="0.55" stroke-width="1.5"/>
  <text x="1096" y="749"
    text-anchor="middle"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="13" font-weight="600" letter-spacing="3"
    fill="#a78bfa" fill-opacity="0.9">AI POWERED</text>
</svg>
