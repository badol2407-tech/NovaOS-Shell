<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d0a1f"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="headlineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="40%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="60" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Ambient glow orbs -->
  <ellipse cx="960" cy="540" rx="520" ry="400" fill="url(#orb1)" filter="url(#softglow)"/>
  <ellipse cx="300" cy="250" rx="280" ry="220" fill="url(#orb2)" filter="url(#softglow)"/>
  <ellipse cx="1620" cy="830" rx="320" ry="260" fill="url(#orb3)" filter="url(#softglow)"/>

  <!-- Stars / particles -->
  <g fill="white">
    <circle cx="120" cy="80" r="1.2" opacity="0.6"/>
    <circle cx="340" cy="160" r="0.8" opacity="0.4"/>
    <circle cx="580" cy="55" r="1.5" opacity="0.7"/>
    <circle cx="780" cy="130" r="0.9" opacity="0.5"/>
    <circle cx="1020" cy="40" r="1.1" opacity="0.55"/>
    <circle cx="1240" cy="100" r="0.7" opacity="0.45"/>
    <circle cx="1460" cy="65" r="1.4" opacity="0.65"/>
    <circle cx="1700" cy="145" r="1.0" opacity="0.5"/>
    <circle cx="1840" cy="80" r="0.8" opacity="0.4"/>
    <circle cx="60" cy="300" r="1.0" opacity="0.45"/>
    <circle cx="220" cy="480" r="0.7" opacity="0.35"/>
    <circle cx="1780" cy="320" r="1.2" opacity="0.55"/>
    <circle cx="1880" cy="550" r="0.9" opacity="0.4"/>
    <circle cx="150" cy="720" r="1.1" opacity="0.5"/>
    <circle cx="400" cy="900" r="0.8" opacity="0.4"/>
    <circle cx="700" cy="980" r="1.3" opacity="0.6"/>
    <circle cx="1100" cy="1020" r="0.7" opacity="0.4"/>
    <circle cx="1500" cy="950" r="1.0" opacity="0.5"/>
    <circle cx="1750" cy="880" r="1.4" opacity="0.6"/>
    <circle cx="1900" cy="750" r="0.8" opacity="0.35"/>
    <circle cx="480" cy="200" r="0.6" opacity="0.3"/>
    <circle cx="900" cy="170" r="1.2" opacity="0.5"/>
    <circle cx="1350" cy="200" r="0.9" opacity="0.45"/>
    <circle cx="1600" cy="180" r="0.7" opacity="0.4"/>
    <circle cx="80" cy="550" r="0.9" opacity="0.4"/>
    <circle cx="1850" cy="450" r="1.1" opacity="0.5"/>
  </g>

  <!-- Decorative horizontal rule above WELCOME -->
  <rect x="700" y="388" width="520" height="1" fill="url(#lineGrad)"/>

  <!-- WELCOME label -->
  <text
    x="960" y="430"
    text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="22"
    font-weight="400"
    fill="rgba(255,255,255,0.38)"
    letter-spacing="12"
  >WELCOME</text>

  <!-- Main headline — Ashikur Rahman Badol -->
  <text
    x="960" y="560"
    text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="88"
    font-weight="700"
    fill="url(#headlineGrad)"
    letter-spacing="-1"
    filter="url(#glow)"
  >Ashikur Rahman Badol</text>

  <!-- Tagline -->
  <text
    x="960" y="625"
    text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="24"
    font-weight="300"
    fill="rgba(255,255,255,0.35)"
    letter-spacing="3"
  >Your intelligent desktop in the cloud</text>

  <!-- Decorative horizontal rule below tagline -->
  <rect x="760" y="660" width="400" height="1" fill="url(#lineGrad)"/>

  <!-- NovaOS badge -->
  <text
    x="960" y="700"
    text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="14"
    font-weight="400"
    fill="rgba(129,140,248,0.65)"
    letter-spacing="5"
  >POWERED BY NOVAOS</text>

  <!-- Corner decorations (subtle geometric) -->
  <g stroke="rgba(255,255,255,0.06)" stroke-width="1" fill="none">
    <polyline points="40,40 40,100 100,100"/>
    <polyline points="1880,40 1880,100 1820,100"/>
    <polyline points="40,1040 40,980 100,980"/>
    <polyline points="1880,1040 1880,980 1820,980"/>
  </g>
</svg>
