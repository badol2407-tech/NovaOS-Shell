        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /workspaces/{workspaceId}/invites/{inviteId}:
    delete:
      operationId: revokeWorkspaceInvite
      tags: [collaboration]
      summary: Revoke a pending invite (owner only)
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
        - name: inviteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Revoked
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /workspaces/invites/accept:
    post:
      operationId: acceptWorkspaceInvite
      tags: [collaboration]
      summary: Accept an invite by token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                displayName:
                  type: string
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  workspace:
                    $ref: "#/components/schemas/Workspace"
                  role:
                    type: string
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Already a member or invite already used
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /workspaces/{workspaceId}/activity:
    get:
      operationId: getWorkspaceActivity
      tags: [collaboration]
      summary: Get recent workspace activity feed
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceActivity"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Phase 11 — Cloud Editor ───────────────────────────────────────────────

  /workspaces/{workspaceId}/files:
    get:
      operationId: listCloudFiles
      tags: [cloudEditor]
      summary: List files in a workspace (no content)
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CloudFile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createCloudFile
      tags: [cloudEditor]
      summary: Create a new file in a workspace
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: string
                content:
                  type: string
                displayName:
                  type: string
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudFile"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /workspaces/{workspaceId}/files/{fileId}:
    get:
      operationId: getCloudFile
      tags: [cloudEditor]
      summary: Get a file with its content
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
        - name: fileId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudFile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: saveCloudFile
      tags: [cloudEditor]
      summary: Save file content (optimistic lock via version)
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
        - name: fileId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content, version]
              properties:
                content:
                  type: string
                version:
                  type: integer
                displayName:
                  type: string
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudFile"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Version conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCloudFile
      tags: [cloudEditor]
      summary: Soft-delete a file
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
        - name: fileId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    UserSettings:
      type: object
      required:
        - userId
        - theme
        - wallpaperId
        - accentColor
        - dockPosition
        - dockAutoHide
        - dockPinnedAppIds
        - updatedAt
      properties:
        userId:
          type: string
        theme:
          type: string
          enum: [light, dark, system]
        wallpaperId:
          type: string
        accentColor:
          type: string
        dockPosition:
          type: string
          enum: [bottom, left, right]
        dockAutoHide:
          type: boolean
        dockPinnedAppIds:
          type: array
          items:
            type: string
        updatedAt:
          type: string
          format: date-time

    UserSettingsUpdate:
      type: object
      properties:
        theme:
          type: string
          enum: [light, dark, system]
        wallpaperId:
          type: string
        accentColor:
          type: string
        dockPosition:
          type: string
          enum: [bottom, left, right]
        dockAutoHide:
          type: boolean
        dockPinnedAppIds:
          type: array
          items:
            type: string

    Wallpaper:
      type: object
      required: [id, name, imageUrl, thumbnailUrl]
      properties:
        id:
          type: string
        name:
          type: string
        imageUrl:
          type: string
        thumbnailUrl:
          type: string

    App:
      type: object
      required: [id, name, icon, category]
      properties:
        id:
          type: string
        name:
          type: string
        icon:
          type: string
        category:
          type: string
        description:
          type: ["string", "null"]

    Notification:
      type: object
      required: [id, title, body, appId, createdAt, read, type]
      properties:
        id:
          type: integer
        title:
          type: string
        body:
          type: string
        appId:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        read:
          type: boolean
        type:
          type: string
          enum: [info, success, warning, error]

    NotificationsSummary:
      type: object
      required: [unreadCount]
      properties:
        unreadCount:
          type: integer

    # ─── GitHub ───────────────────────────────────────────────────────────────

    GitHubStatus:
      type: object
      required: [connected, login]
      properties:
        connected:
          type: boolean
        login:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        name:
          type: ["string", "null"]

    GitHubTokenInput:
      type: object
      required: [token]
      properties:
        token:
          type: string
          minLength: 1

    GitHubRepo:
      type: object
      required: [id, name, fullName, private, description, defaultBranch, language, stargazersCount, forksCount, updatedAt, htmlUrl]
      properties:
        id:
          type: integer
        name:
          type: string
        fullName:
          type: string
        private:
          type: boolean
        description:
          type: ["string", "null"]
        defaultBranch:
          type: string
        language:
          type: ["string", "null"]
        stargazersCount:
          type: integer
        forksCount:
          type: integer
        updatedAt:
          type: string
          format: date-time
        htmlUrl:
          type: string

    GitHubBranch:
      type: object
      required: [name, sha]
      properties:
        name:
          type: string
        sha:
          type: string
        protected:
          type: boolean

    GitHubCommit:
      type: object
      required: [sha, message, author, date, htmlUrl]
      properties:
        sha:
          type: string
        message:
          type: string
        author:
          type: string
        authorAvatarUrl:
          type: ["string", "null"]
        date:
          type: string
          format: date-time
        htmlUrl:
          type: string

    # ─── Projects ─────────────────────────────────────────────────────────────

    Project:
      type: object
      required: [id, userId, name, color, status, taskCount, createdAt, updatedAt]
      properties:
        id:
          type: integer
        userId:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        color:
          type: string
        status:
          type: string
          enum: [active, archived]
        taskCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProjectWithTasks:
      type: object
      required: [id, userId, name, color, status, tasks, createdAt, updatedAt]
      properties:
        id:
          type: integer
        userId:
          type: string
        name:
          type: string
        description:
          type: ["string", "null"]
        color:
          type: string
        status:
          type: string
          enum: [active, archived]
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/Task"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProjectInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
        color:
          type: string

    ProjectUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
        color:
          type: string
        status:
          type: string
          enum: [active, archived]

    ProjectStats:
      type: object
      required: [totalProjects, activeProjects, totalTasks, todoTasks, inProgressTasks, doneTasks]
      properties:
        totalProjects:
          type: integer
        activeProjects:
          type: integer
        totalTasks:
          type: integer
        todoTasks:
          type: integer
        inProgressTasks:
          type: integer
        doneTasks:
          type: integer

    Task:
      type: object
      required: [id, projectId, userId, title, status, priority, position, createdAt, updatedAt]
      properties:
        id:
          type: integer
        projectId:
          type: integer
        userId:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
          enum: [todo, in_progress, done]
        priority:
          type: string
          enum: [low, medium, high]
        dueDate:
          type: ["string", "null"]
          format: date
        position:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TaskInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
        status:
          type: string
          enum: [todo, in_progress, done]
        priority:
          type: string
          enum: [low, medium, high]
        dueDate:
          type: string
          format: date

    TaskUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
        status:
          type: string
          enum: [todo, in_progress, done]
        priority:
          type: string
          enum: [low, medium, high]
        dueDate:
          type: ["string", "null"]
          format: date
        position:
          type: integer

    # ─── Nova AI ──────────────────────────────────────────────────────────────

    NovaConversation:
      type: object
      required: [id, userId, title, model, createdAt, updatedAt]
      properties:
        id:
          type: string
        userId:
          type: string
        title:
          type: string
        model:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    NovaConversationInput:
      type: object
      properties:
        title:
          type: string
        model:
          type: string

    NovaMessage:
      type: object
      required: [id, conversationId, role, content, createdAt]
      properties:
        id:
          type: integer
        conversationId:
          type: string
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string
        provider:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    SendNovaMessageBody:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1

    NovaQuickAskBody:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1

    NovaQuickAskResponse:
      type: object
      required: [response, provider]
      properties:
        response:
          type: string
        provider:
          type: string

    NovaProvider:
      type: object
      required: [name, available]
      properties:
        name:
          type: string
        available:
          type: boolean

    NovaProviderStatus:
      type: object
      required: [providers]
      properties:
        providers:
          type: array
          items:
            $ref: "#/components/schemas/NovaProvider"

    NovaPreferences:
      type: object
      required: [userId, preferredProvider, temperature, responseStyle, updatedAt]
      properties:
        userId:
          type: string
        preferredProvider:
          type: ["string", "null"]
        temperature:
          type: number
        responseStyle:
          type: string
          enum: [concise, balanced, detailed]
        updatedAt:
          type: string
          format: date-time

    NovaPreferencesInput:
      type: object
      properties:
        preferredProvider:
          type: ["string", "null"]
        temperature:
          type: number
          minimum: 0
          maximum: 1
        responseStyle:
          type: string
          enum: [concise, balanced, detailed]

    NovaSettings:
      type: object
      required:
        [
          userId,
          streamingEnabled,
          memoryEnabled,
          maxContextMessages,
          suggestionsEnabled,
          updatedAt,
        ]
      properties:
        userId:
          type: string
        streamingEnabled:
          type: boolean
        memoryEnabled:
          type: boolean
        maxContextMessages:
          type: integer
        suggestionsEnabled:
          type: boolean
        updatedAt:
          type: string
          format: date-time

    NovaSettingsInput:
      type: object
      properties:
        streamingEnabled:
          type: boolean
        memoryEnabled:
          type: boolean
        maxContextMessages:
          type: integer
          minimum: 1
          maximum: 100
        suggestionsEnabled:
          type: boolean

    # ── Phase 11 — Collaboration ──────────────────────────────────────────────

    Workspace:
      type: object
      required: [id, ownerUserId, name, description, color, createdAt, updatedAt]
      properties:
        id:
          type: string
        ownerUserId:
          type: string
        name:
          type: string
        description:
          type: string
        color:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

